apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  annotations:
  name: {{ .Values.name }}
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`{{ .Values.name }}.aretehosting.com`)
    services:
    - name: {{ .Values.name }}-cli
      port: 8080
  tls:
    secretName: arete-hosting-tls