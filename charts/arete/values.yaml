cnscp:
  name: cnscp
  serviceAccountName: cnscp
  imageRepository: us-central1-docker.pkg.dev/padi-staging/cnscp/cns-cli
  imageTag: latest
  pullPolicy: Always
  replicas: 1
  containerPort: 8080
  servicePort: 8080
  config:
    - name: CNS_HOST
      value: "127.0.0.1"
    - name: CNS_PORT
      value: 2379
    - name: CNS_USERNAME
      value: username
    - name: CNS_PASSWORD
      value: password
    - name: CNS_PROFILES
      value: "https://cp.padi.io/profiles"
  env:


etcd:
  name: arete-etcd
  containerName: arete-etcd
  imageRepository: quay.io/coreos/etcd
  imageTag: 'v3.5.0'
  servicePort: 2379
  peerPort: 2380
  args:
    - arg: "name"
      value: "arete-etcd-0"
    - arg: "listen-client-urls"
      value: "http://0.0.0.0:2379"
    - arg: "advertise-client-urls"
      value: "http://0.0.0.0:2379"
    - arg: "data-dir"
      value: "/etcd-data"
  dataMountPoint: "/etcd-data"
  env:
    # - name: foo
    #   value: bar
  istioGateway:
    enabled: false
    selectorKey: istio
    selectorValue: ingressGateway
    serviceIngressPort: 2379
    peerIngressPort: 2380
    hosts:
      - "*"
  pvc:
    enabled: true
    storageClassName: standard
    accessModes:
      - ReadWriteOnce
    volumeSize: 1Gi


orchestrator:
  name: orchestrator
  serviceAccountName: orchestrator
  imageRepository: us-central1-docker.pkg.dev/padi-staging/cnscp/cns-corchestrator
  imageTag: latest
  pullPolicy: Always
  replicas: 1
  config:
    - name: CNS_HOST
      value: "http://etcd.cns.dev"
    - name: CNS_PORT
      value: 2379
    - name: CNS_USERNAME
      value: username
    - name: CNS_PASSWORD
      value: password
    - name: CNS_PROFILES
      value: "https://cp.padi.io/profiles"
